name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-ado-removal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check for ADO functionality
        run: |
          if [ -f "./scripts/verify-ado-removal.sh" ]; then
            ./scripts/verify-ado-removal.sh
          else
            echo "ADO verification script not found"
            exit 0
          fi