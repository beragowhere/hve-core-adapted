name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-ado-removal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for ADO references
        run: |
          if [ -f "./scripts/verify-ado-removal.sh" ]; then
            ./scripts/verify-ado-removal.sh
          else
            echo "ADO verification script not found"
            exit 0
          fi

  build:
    runs-on: ubuntu-latest
    needs: verify-ado-removal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build documentation
        run: npm run docs:build